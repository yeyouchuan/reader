services:
  minio:
    image: minio/minio
    hostname: minio
    ports:
      - 9001:9001
      - 9000:9000
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio-data:/data/minio
    command: server /data/minio --console-address ":9001"
    healthcheck:
      test:
        [
          'CMD',
          'curl',
          '-f',
          'http://localhost:9001/minio/health/live'
        ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      default:
        aliases:
          - minio.dev.jina.ai

volumes:
  minio-data:
